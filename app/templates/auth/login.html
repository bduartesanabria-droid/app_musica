{% extends "base.html" %}
{% block title %}Iniciar Sesión{% endblock %}

{% block body %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-primary-900 via-blue-900 to-indigo-900 px-4">
  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-accent-500 rounded-2xl mb-4 shadow-xl">
        <span class="text-3xl">♪</span>
      </div>
      <h1 class="text-3xl font-black text-white tracking-tight">SEMIMUS</h1>
      <p class="text-blue-300 text-sm mt-1">Sistema de Entrenamiento Melódico Musical</p>
    </div>

    <!-- Card -->
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-8">
      <h2 class="text-xl font-bold text-gray-900 dark:text-white mb-6 text-center">Bienvenido de nuevo</h2>

      <form method="POST" class="space-y-5">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Correo electrónico</label>
          <input type="email" id="email" name="email" required autocomplete="email"
                 placeholder="tu@email.com"
                 value="{{ request.form.email or '' }}"
                 class="form-input">
        </div>

        <div x-data="{ show: false }">
          <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Contraseña</label>
          <div class="relative">
            <input :type="show ? 'text' : 'password'" id="password" name="password" required
                   placeholder="••••••••" autocomplete="current-password"
                   class="form-input pr-10">
            <button type="button" @click="show = !show"
                    class="absolute inset-y-0 right-3 flex items-center text-gray-400 hover:text-gray-600">
              <span x-show="!show">👁</span>
              <span x-show="show" x-cloak>🙈</span>
            </button>
          </div>
        </div>

        <div class="flex items-center justify-between text-sm">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" name="remember" class="rounded border-gray-300 text-primary-600">
            <span class="text-gray-600 dark:text-gray-400">Recordarme</span>
          </label>
          <a href="{{ url_for('auth.forgot_password') }}"
             class="text-primary-600 hover:text-primary-700 font-medium">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit"
                class="w-full btn-primary py-3 text-base font-bold shadow-lg hover:shadow-xl">
          Ingresar
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 dark:text-gray-400 mt-6">
        ¿No tienes cuenta?
        <a href="{{ url_for('auth.register') }}" class="text-primary-600 hover:underline font-medium">Regístrate gratis</a>
      </p>
    </div>

    <p class="text-center text-xs text-white/40 mt-6">© 2026 SEMIMUS · Música Andina Colombiana</p>
  </div>
</div>
{% endblock %}
