# ─────────────────────────────────────────────────────────────
# SEMIMUS — Nginx Reverse Proxy
# Coolify gestiona SSL/TLS por fuera de este contenedor.
# Este archivo solo maneja el ruteo interno HTTP.
# ─────────────────────────────────────────────────────────────

upstream backend_api {
    server backend:5000;
    keepalive 32;
}

upstream frontend_app {
    server frontend:80;
    keepalive 16;
}

# ── Configuración de proxy compartida ─────────────────────────
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # Tamaño máximo de subida (audios hasta 50 MB)
    client_max_body_size  60M;
    client_body_timeout   60s;
    proxy_connect_timeout 30s;
    proxy_read_timeout    60s;
    proxy_send_timeout    60s;

    # Compresión
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        image/svg+xml;

    # ── Cabeceras de seguridad ─────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header X-Frame-Options         "SAMEORIGIN"      always;
    add_header X-XSS-Protection        "1; mode=block"   always;
    add_header Referrer-Policy         "strict-origin"   always;

    # ── API REST → Backend Flask ───────────────────────────────
    location /api/ {
        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # CORS no manejado aquí — lo gestiona Flask-CORS
    }

    # ── Streaming de audio (rango de bytes) ───────────────────
    location /api/audio/stream/ {
        proxy_pass             http://backend_api;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       Range             $http_range;
        proxy_set_header       If-Range          $http_if_range;
        proxy_cache_bypass     $http_range;
        proxy_force_ranges     on;

        add_header Accept-Ranges  bytes;
        add_header Cache-Control  "public, max-age=86400";
    }

    # ── Archivos estáticos del frontend (cache agresivo) ──────
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;

        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    # ── PWA: manifest y service worker (sin cache) ────────────
    location ~* (manifest\.webmanifest|sw\.js|workbox-.+\.js)$ {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;

        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        expires    0;
    }

    # ── Frontend React SPA → siempre devuelve index.html ──────
    location / {
        proxy_pass         http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;

        # Cache nulo para HTML (React Router maneja la navegación)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
