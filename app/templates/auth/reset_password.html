{% extends "base.html" %}
{% block title %}Nueva Contraseña{% endblock %}

{% block body %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-primary-900 via-blue-900 to-indigo-900 px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-accent-500 rounded-2xl mb-4">
        <span class="text-3xl">♪</span>
      </div>
      <h1 class="text-3xl font-black text-white">SEMIMUS</h1>
    </div>

    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-8">
      <div class="text-center mb-6">
        <div class="text-4xl mb-3">🔒</div>
        <h2 class="text-xl font-bold text-gray-900 dark:text-white">Crea una nueva contraseña</h2>
      </div>

      <form method="POST" class="space-y-5">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div x-data="{ show: false }">
          <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Nueva contraseña</label>
          <div class="relative">
            <input :type="show ? 'text' : 'password'" id="password" name="password" required
                   placeholder="Mínimo 8 caracteres" class="form-input pr-10">
            <button type="button" @click="show = !show" class="absolute inset-y-0 right-3 flex items-center text-gray-400">
              <span x-show="!show">👁</span><span x-show="show" x-cloak>🙈</span>
            </button>
          </div>
        </div>
        <div>
          <label for="confirm_password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Confirmar contraseña</label>
          <input type="password" id="confirm_password" name="confirm_password" required
                 placeholder="Repite la contraseña" class="form-input">
        </div>
        <button type="submit" class="w-full btn-primary py-3 font-bold">Guardar contraseña</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
