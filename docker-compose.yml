services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-semimus}
      POSTGRES_USER:     ${POSTGRES_USER:-semimus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-semimus_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-semimus}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    expose:
      - "6000"
    environment:
      FLASK_ENV:          ${FLASK_ENV:-production}
      SECRET_KEY:         ${SECRET_KEY:-change-me-in-prod-32chars}
      DATABASE_URL:       postgresql://${POSTGRES_USER:-semimus}:${POSTGRES_PASSWORD:-semimus_secret}@db:5432/${POSTGRES_DB:-semimus}
      AUDIO_STORAGE_PATH: /app/audio_storage
      MAIL_SERVER:        ${MAIL_SERVER:-}
      MAIL_PORT:          ${MAIL_PORT:-587}
      MAIL_USERNAME:      ${MAIL_USERNAME:-}
      MAIL_PASSWORD:      ${MAIL_PASSWORD:-}
    volumes:
      - audio_data:/app/audio_storage
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "flask db upgrade &&
             gunicorn run:app
             --bind 0.0.0.0:6000
             --workers 2
             --threads 2
             --timeout 60
             --access-logfile -
             --error-logfile -"

volumes:
  postgres_data:
  audio_data:
