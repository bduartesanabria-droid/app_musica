name: SEMIMUS CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ── 1. Lint y tests básicos ─────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       semimus_test
          POSTGRES_USER:     semimus
          POSTGRES_PASSWORD: semimus123
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check syntax (py_compile)
        run: |
          python -m py_compile run.py config.py
          python -m py_compile app/__init__.py app/extensions.py
          python -m py_compile app/models/user.py app/models/instrument.py
          python -m py_compile app/models/audio.py app/models/question.py
          python -m py_compile app/models/session.py app/models/progress.py
          python -m py_compile app/models/gamification.py
          python -m py_compile app/routes/auth.py app/routes/main.py
          python -m py_compile app/routes/training.py app/routes/audio.py
          python -m py_compile app/routes/admin.py app/routes/api.py
          python -m py_compile app/utils/filters.py app/utils/question_generator.py

      - name: Initialize and migrate DB
        env:
          FLASK_APP:    run.py
          FLASK_ENV:    testing
          DATABASE_URL: postgresql://semimus:semimus123@localhost:5432/semimus_test
          SECRET_KEY:   test-secret-key-32chars-minimum!!
        run: |
          flask db init
          flask db migrate -m "initial"
          flask db upgrade

  # ── 2. Build Docker (solo en main) ─────────────────────────────────────────
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: backend-tests
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy via Coolify webhook ──────────────────────────────────────────
  deploy:
    name: Deploy to Coolify
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Coolify Webhook
        run: |
          curl -X POST "${{ secrets.COOLIFY_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json"
