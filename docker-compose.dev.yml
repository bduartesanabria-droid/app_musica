# Overrides para DESARROLLO LOCAL
# Uso: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
# O: renombra este archivo a docker-compose.override.yml y ejecuta: docker-compose up

services:

  db:
    ports:
      - "5432:5432"

  web:
    environment:
      FLASK_ENV:   development
      FLASK_DEBUG: "1"
      SECRET_KEY:  dev-secret-key-not-for-production
    volumes:
      - .:/app
      - /app/__pycache__
    command: >
      flask run
      --host=0.0.0.0
      --port=6000
      --debug
      --reload
    ports:
      - "6000:6000"
