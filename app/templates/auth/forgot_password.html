{% extends "base.html" %}
{% block title %}Recuperar Contraseña{% endblock %}

{% block body %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-primary-900 via-blue-900 to-indigo-900 px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-accent-500 rounded-2xl mb-4">
        <span class="text-3xl">♪</span>
      </div>
      <h1 class="text-3xl font-black text-white">SEMIMUS</h1>
    </div>

    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-8">
      <div class="text-center mb-6">
        <div class="text-4xl mb-3">🔑</div>
        <h2 class="text-xl font-bold text-gray-900 dark:text-white">¿Olvidaste tu contraseña?</h2>
        <p class="text-sm text-gray-500 mt-2">Ingresa tu email y te enviaremos un enlace para recuperarla.</p>
      </div>

      <form method="POST" class="space-y-5">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Correo electrónico</label>
          <input type="email" id="email" name="email" required placeholder="tu@email.com" class="form-input">
        </div>
        <button type="submit" class="w-full btn-primary py-3 font-bold">Enviar enlace</button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        <a href="{{ url_for('auth.login') }}" class="text-primary-600 hover:underline">← Volver al inicio de sesión</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
