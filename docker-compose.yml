version: "3.9"

# ============================================================
# SEMIMUS - Sistema de Entrenamiento Melódico Musical
# docker-compose.yml  →  Producción
# Uso: docker-compose up -d
# ============================================================

services:

  # ──────────────────────────────────────────────────────────
  # BASE DE DATOS
  # ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: semimus_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-semimus}
      POSTGRES_USER:     ${POSTGRES_USER:-semimus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-semimus123}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"        # solo accesible localmente
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-semimus} -d ${POSTGRES_DB:-semimus}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - semimus_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ──────────────────────────────────────────────────────────
  # CACHÉ / RATE LIMITING
  # ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: semimus_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - semimus_net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ──────────────────────────────────────────────────────────
  # BACKEND  Flask / Gunicorn
  # ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
    image: semimus/backend:latest
    container_name: semimus_backend
    restart: unless-stopped
    environment:
      # ── Entorno ──────────────────────────────────────────
      FLASK_ENV:            ${FLASK_ENV:-production}
      # ── Seguridad ─────────────────────────────────────────
      SECRET_KEY:           ${SECRET_KEY:?SECRET_KEY es requerido}
      JWT_SECRET_KEY:       ${JWT_SECRET_KEY:?JWT_SECRET_KEY es requerido}
      # ── Base de datos ─────────────────────────────────────
      DATABASE_URL:         postgresql://${POSTGRES_USER:-semimus}:${POSTGRES_PASSWORD:-semimus123}@postgres:5432/${POSTGRES_DB:-semimus}
      # ── Redis ─────────────────────────────────────────────
      REDIS_URL:            redis://redis:6379/0
      # ── Audio ─────────────────────────────────────────────
      AUDIO_STORAGE_PATH:   /app/storage/audio
      MAX_AUDIO_SIZE_MB:    ${MAX_AUDIO_SIZE_MB:-50}
      # ── URLs ──────────────────────────────────────────────
      FRONTEND_URL:         ${FRONTEND_URL:-http://localhost}
      CORS_ORIGINS:         ${CORS_ORIGINS:-http://localhost}
      # ── Correo ────────────────────────────────────────────
      MAIL_SERVER:          ${MAIL_SERVER:-smtp.gmail.com}
      MAIL_PORT:            ${MAIL_PORT:-587}
      MAIL_USERNAME:        ${MAIL_USERNAME:-}
      MAIL_PASSWORD:        ${MAIL_PASSWORD:-}
      MAIL_DEFAULT_SENDER:  ${MAIL_DEFAULT_SENDER:-noreply@semimus.app}
      # ── Gunicorn ──────────────────────────────────────────
      GUNICORN_WORKERS:     ${GUNICORN_WORKERS:-4}
      GUNICORN_TIMEOUT:     ${GUNICORN_TIMEOUT:-120}
    volumes:
      - audio_storage:/app/storage/audio
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - semimus_net
    expose:
      - "5000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ──────────────────────────────────────────────────────────
  # FRONTEND  React / Nginx estático
  # ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
        VITE_API_URL: ${VITE_API_URL:-/api}
    image: semimus/frontend:latest
    container_name: semimus_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - semimus_net
    expose:
      - "80"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ──────────────────────────────────────────────────────────
  # PROXY INVERSO  Nginx
  # ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: semimus_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - audio_storage:/var/www/audio:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - semimus_net
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && curl -f http://localhost/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

# ──────────────────────────────────────────────────────────
# VOLÚMENES PERSISTENTES
# ──────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      device: ${POSTGRES_DATA_PATH:-./data/postgres}
      o: bind

  redis_data:
    driver: local
    driver_opts:
      type: none
      device: ${REDIS_DATA_PATH:-./data/redis}
      o: bind

  audio_storage:
    driver: local
    driver_opts:
      type: none
      device: ${AUDIO_DATA_PATH:-./data/audio}
      o: bind

  nginx_logs:
    driver: local

# ──────────────────────────────────────────────────────────
# RED INTERNA
# ──────────────────────────────────────────────────────────
networks:
  semimus_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
